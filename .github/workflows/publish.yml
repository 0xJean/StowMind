name: publish

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "已存在的 Git 标签（如 v1.0.0），将检出该标签并发布"
        required: true
        type: string
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            pkg-config \
            libssl-dev

      - name: setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: install frontend dependencies
        run: pnpm install --frozen-lockfile

      # 未配置 Secrets 时，${{ secrets.X }} 会变成「空字符串」。若把空的 APPLE_CERTIFICATE 传给进程，
      # Tauri 仍会走「从环境变量导入钥匙串证书」分支并失败（全平台同一 workflow 里也会拖垮 mac 矩阵）。
      # 因此仅在 macOS 且证书 Secret 非空时，才把 Apple 变量写入 GITHUB_ENV（变量未设置 = 不签名，构建可成功）。
      # 见 https://tauri.app/v1/guides/distribution/sign-macos
      - name: macOS signing env from secrets (optional)
        if: matrix.platform == 'macos-latest'
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          if [ -z "${APPLE_CERTIFICATE}" ]; then
            echo "APPLE_CERTIFICATE not set — building unsigned macOS artifacts."
            exit 0
          fi
          d="APPLE_EOF_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}_$(openssl rand -hex 8)"
          {
            echo "APPLE_CERTIFICATE<<${d}"
            printf '%s\n' "${APPLE_CERTIFICATE}"
            echo "${d}"
          } >> "${GITHUB_ENV}"
          {
            echo "APPLE_CERTIFICATE_PASSWORD<<${d}_P12"
            printf '%s\n' "${APPLE_CERTIFICATE_PASSWORD}"
            echo "${d}_P12"
          } >> "${GITHUB_ENV}"
          {
            echo "APPLE_SIGNING_IDENTITY<<${d}_ID"
            printf '%s\n' "${APPLE_SIGNING_IDENTITY}"
            echo "${d}_ID"
          } >> "${GITHUB_ENV}"
          if [ -n "${APPLE_ID}" ] && [ -n "${APPLE_PASSWORD}" ] && [ -n "${APPLE_TEAM_ID}" ]; then
            {
              echo "APPLE_ID<<${d}_AID"
              printf '%s\n' "${APPLE_ID}"
              echo "${d}_AID"
            } >> "${GITHUB_ENV}"
            {
              echo "APPLE_PASSWORD<<${d}_APW"
              printf '%s\n' "${APPLE_PASSWORD}"
              echo "${d}_APW"
            } >> "${GITHUB_ENV}"
            {
              echo "APPLE_TEAM_ID<<${d}_TID"
              printf '%s\n' "${APPLE_TEAM_ID}"
              echo "${d}_TID"
            } >> "${GITHUB_ENV}"
          fi

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "StowMind ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

